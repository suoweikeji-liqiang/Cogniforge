version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: las-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=las_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d las_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./las_backend
      dockerfile: Dockerfile
    container_name: las-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/las_db
      - AUTO_CREATE_TABLES=false

  frontend:
    build:
      context: ./las_frontend
      dockerfile: Dockerfile
    container_name: las-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
